name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-mac:
    runs-on: macos-14        # arm64-runner — matchar vårt distributionsformat
    permissions:
      contents: write        # krävs för att skapa/uppdatera GitHub Releases

    steps:
      - name: Checka ut kod
        uses: actions/checkout@v4

      - name: Sätt upp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installera beroenden (inkl. JRE-nedladdning)
        run: npm ci

      - name: Bygg och publicera release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist
