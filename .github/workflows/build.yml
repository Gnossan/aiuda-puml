name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-mac:
    runs-on: macos-14        # arm64-runner — matchar vårt distributionsformat
    permissions:
      contents: write        # krävs för att skapa/uppdatera GitHub Releases
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checka ut kod
        uses: actions/checkout@v4

      - name: Sätt upp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Sätt version från tagg
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version

      - name: Installera beroenden (inkl. JRE-nedladdning)
        run: npm ci

      - name: Bygg och publicera release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK:                    ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD:            ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist
